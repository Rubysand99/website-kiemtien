<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verify</title>

<style>
body{
background:#0b0f14;
color:white;
text-align:center;
padding-top:100px;
font-family:Arial;
}
</style>
</head>

<body>

<h2>✅ Đang xác nhận...</h2>

<p id="msg"></p>

<script>

const API = "https://website-kiemtien.onrender.com";
let user = localStorage.getItem("user");

if(!user){
  msg.innerText="❌ Chưa đăng nhập!";
}else{

fetch(API+"/reward",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({username:user})
})
.then(r=>r.json())
.then(d=>{
 if(d.msg=="ok"){
   msg.innerText="💰 +500đ!";
 }
 else{
   msg.innerText="⏳ Chờ 1 tiếng!";
 }
});

}

</script>

</body>
</html>
