<!DOCTYPE html>
<html>
<body>

<h2 id="status">Đang xác minh...</h2>

<script>

const API = "https://website-kiemtien.onrender.com";

let user = localStorage.getItem("user");
let link_id = localStorage.getItem("link_id");
let token = localStorage.getItem("verify_token");

if(!user){
document.getElementById("status").innerText = "Chưa login";
throw new Error();
}

if(!token){
document.getElementById("status").innerText = "Chưa vượt link";
throw new Error();
}

fetch(API + "/verify", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({username:user, link_id:link_id})
})
.then(res=>res.text())
.then(msg=>{
document.getElementById("status").innerText = msg;
localStorage.removeItem("verify_token");
});

</script>

</body>
</html>
