<script>
const API = "https://website-kiemtien.onrender.com";

function register(){
fetch(API+"/register",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({
   username: document.getElementById("user").value,
   password: document.getElementById("pass").value
 })
})
.then(r=>r.json())
.then(d=>alert(JSON.stringify(d)))
.catch(e=>alert("Lỗi API"));
}

function login(){
fetch(API+"/login",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({
   username: document.getElementById("user").value,
   password: document.getElementById("pass").value
 })
})
.then(r=>r.json())
.then(d=>{
 if(d.msg=="ok"){
   localStorage.setItem("user", d.username);
   alert("Đăng nhập thành công");
   location.href="dashboard.html";
 }else{
   alert("Sai tài khoản");
 }
})
.catch(e=>alert("Lỗi API"));
}
</script>
